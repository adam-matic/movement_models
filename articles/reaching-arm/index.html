<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2052BB">
    <meta name="author" content="Adam Matić">
    <link href="../../css/base.css" rel="stylesheet" type="text/css"/>
    <title>Model-free reaching arm – Movement models</title>
    <meta name="description" content="An interactive 2-DOF, 4-muscle arm that reaches without inverse kinematics or inverse dynamics, controlled by a Perceptual Control Theory cascade running in your browser on motornet.js, with an in-browser evolutionary optimiser.">
    <style>
        .sim-wrap { max-width: 46rem; margin: 1.5em auto 0; padding: 0 3rem; }
        .arm-stage {
            position: relative;
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            aspect-ratio: 1 / 1;
        }
        .arm-stage canvas {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            background: #fbfcfe;
            border: 1px solid #e6e9f0;
            border-radius: 10px;
            touch-action: none;
            cursor: crosshair;
        }
        .diag {
            text-align: center;
            font-size: 0.9em;
            color: #666;
            font-variant-numeric: tabular-nums;
            margin: 0.6em 0 0.2em;
        }
        .hint { text-align: center; font-size: 0.85em; color: #999; margin-bottom: 1em; }

        /* muscle activation bars */
        .mbars { max-width: 360px; margin: 1em auto 0.4em; }
        .mbar-row { display: flex; align-items: center; gap: 0.6em; margin: 3px 0; }
        .mbar-name { width: 5.5em; font-size: 0.8em; color: #777; text-align: right; }
        .mbar-track { flex: 1; height: 12px; background: #eef0f4; border-radius: 6px; overflow: hidden; }
        .mbar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2052BB, #5b86e5); transition: width 0.05s linear; }

        /* control panels */
        .panel { max-width: 40rem; margin: 1.4em auto 0; }
        .panel h3 {
            font-size: 0.78em; text-transform: uppercase; letter-spacing: 0.05em;
            color: #2052BB; margin: 1.1em 0 0.3em; padding: 0; font-family: inherit;
        }
        .ctrl-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 0.35em 1.6em;
        }
        .ctrl-grid label { display: flex; align-items: center; gap: 0.6em; font-size: 0.92em; color: #555; }
        .ctrl-grid label .nm { flex: 0 0 5.6em; }
        .ctrl-grid input[type=range] { flex: 1; cursor: pointer; min-width: 60px; }
        .ctrl-grid .vv { flex: 0 0 4.2em; text-align: right; font-variant-numeric: tabular-nums; color: #333; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 0.6em; justify-content: center; margin: 1.2em 0 0; }
        .btn-row button {
            padding: 0.35em 1.1em; font-size: 0.92em; font-family: inherit;
            background: #fff; border: 2px solid #2052BB; color: #2052BB;
            border-radius: 6px; cursor: pointer;
        }
        .btn-row button:hover { background: #f0f4ff; }
        .fig-caption { text-align: center; font-size: 0.88em; color: #888; margin-top: 0.3em; }
    </style>
</head>
<body>
<div id="main_container">
<div id="body">
<div id="banner">
    <div id="banner_wrapper">
        <div id="banner_content">
            <div id="site_title"><a href="/">Movement models, simulation and control</a></div>
            <div id="navigation"><a href="/">Home</a></div>
        </div>
    </div>
</div>

<div id="content">
<div class="article">

<div class="sim-wrap">
    <div class="arm-stage">
        <canvas id="arm_canvas"></canvas>
    </div>
    <div class="diag" id="diag">&nbsp;</div>

    <div class="mbars" id="muscle_bars"></div>

    <div class="panel">
        <div class="ctrl-grid">
            <label><span class="nm">Reach r*</span><input type="range" id="sl_rref" min="0.05" max="0.62" step="0.005"><span class="vv" id="val_rref"></span></label>
            <label><span class="nm">Point φ*</span><input type="range" id="sl_phiref" min="10" max="170" step="1"><span class="vv" id="val_phiref"></span></label>
            <label><span class="nm">Co-contract c*</span><input type="range" id="sl_cref" min="0" max="500" step="5" value="0"><span class="vv" id="val_cref"></span></label>
        </div>

        <div class="ctrl-grid">
            <label><span class="nm">K<sub>P,r</sub></span><input type="range" id="sl_kp_r"><span class="vv" id="val_kp_r"></span></label>
            <label><span class="nm">K<sub>D,r</sub></span><input type="range" id="sl_kd_r"><span class="vv" id="val_kd_r"></span></label>
            <label><span class="nm">K<sub>P,φ</sub></span><input type="range" id="sl_kp_phi"><span class="vv" id="val_kp_phi"></span></label>
            <label><span class="nm">K<sub>D,φ</sub></span><input type="range" id="sl_kd_phi"><span class="vv" id="val_kd_phi"></span></label>
            <label><span class="nm">Leak</span><input type="range" id="sl_leak"><span class="vv" id="val_leak"></span></label>
            <label><span class="nm">K<sub>co</sub></span><input type="range" id="sl_k_co"><span class="vv" id="val_k_co"></span></label>
            <label><span class="nm">Proprio.</span><input type="range" id="sl_prop"><span class="vv" id="val_prop"></span></label>
            <label><span class="nm">GTO (Ib)</span><input type="range" id="sl_gto"><span class="vv" id="val_gto"></span></label>
            <label><span class="nm">Geometry</span><input type="range" id="sl_spn"><span class="vv" id="val_spn"></span></label>
        </div>

        <div class="btn-row">
            <button id="btn_pause">⏸ Pause</button>
            <button id="btn_reset">↺ Reset arm</button>
            <button id="btn_evolve">⚙ Evolve</button>
            <button id="btn_defaults">Restore defaults</button>
        </div>
        <div class="diag" id="evo_status">&nbsp;</div>
    </div>
</div>

</div>
</div>
</div>
</div>

<script type="module" src="./reach-demo.js"></script>
</body>
</html>
